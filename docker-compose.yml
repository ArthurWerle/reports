services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reports-network

  reports:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SERVICE_CONTAINER_NAME}
    # stack.env supplies every app variable (DB_*, service URLs, SMTP, etc.).
    env_file:
      - stack.env
    ports:
      - "${SERVICE_PORT}:${SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reports-network
      - financer-transactions_transactions-network
      - bff_back-end

volumes:
  postgres_data:

networks:
  reports-network:
    driver: bridge
  # Shared external network that transactions / ai-internal / mcp-api / events
  # join, so reports reaches them (and the events callback reaches reports) by
  # container name.
  financer-transactions_transactions-network:
    external: true
  # ai-internal (prod) also joins this bff network; reports uses it to reach
  # ai-internal at http://ai-internal:3005. Staging uses staging_bff_back-end.
  bff_back-end:
    external: true
