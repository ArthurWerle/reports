# Staging stack. Structurally identical to docker-compose.yml; the distinct
# top-level project name plus a staging stack.env (different container names,
# ports, DB creds, and service URLs pointing at -staging containers) let it run
# side by side with prod in Portainer. Set SCHEDULER_ENABLED=false in the
# staging stack.env so only prod emails on the 1st.
name: reports-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reports-network

  reports-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SERVICE_CONTAINER_NAME}
    env_file:
      - stack.env
    ports:
      - "${SERVICE_PORT}:${SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reports-network
      - financer-transactions_transactions-network
      - staging_bff_back-end

volumes:
  postgres_data:

networks:
  reports-network:
    driver: bridge
  financer-transactions_transactions-network:
    external: true
  # ai-internal-staging joins this staging bff network; reports-staging uses it
  # to reach ai-internal-staging. Kept distinct from prod's bff_back-end so the
  # environments don't share DNS aliases.
  staging_bff_back-end:
    external: true
